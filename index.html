<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta de Transacciones Bancarias - VecoPulse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container-fluid py-4 px-3 px-lg-4">
    <div class="row g-4">
      <aside class="col-12 col-lg-3 col-xl-2">
        <div class="card border-0 shadow-sm sticky-menu">
          <div class="card-body p-3">
            <h2 class="h6 mb-3">Paises</h2>
            <div id="countryMenu" class="d-grid gap-2"></div>
          </div>
        </div>
      </aside>

      <section class="col-12 col-lg-9 col-xl-10">
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-body p-4">
            <h1 class="h3 mb-2">Consulta de Transacciones Bancarias</h1>
            <p class="text-secondary mb-4">Selecciona el pais y el tipo de consulta. Luego completa los datos para buscar tu transaccion.</p>

            <form id="searchForm" class="row g-3">
              <div class="col-12">
                <label for="endpointSelect" class="form-label">Tipo de consulta</label>
                <select id="endpointSelect" class="form-select" required></select>
              </div>

              <div id="dynamicFields" class="col-12">
                <div class="row g-3" id="dynamicFieldsRow"></div>
              </div>

              <div class="col-12 d-grid d-md-flex justify-content-md-end">
                <button type="submit" id="searchBtn" class="btn btn-primary px-4">Consultar</button>
              </div>
            </form>
          </div>
        </div>

        <section id="loadingState" class="text-center py-5 d-none">
          <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
          <p class="mt-3 mb-0">Consultando transaccion...</p>
        </section>

        <section id="resultSection" class="d-none">
          <div class="row g-4">
            <div class="col-12">
              <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                  <h2 class="h5 mb-0">Resultado de la consulta</h2>
                </div>
                <div class="card-body">
                  <div id="mainData" class="row g-3"></div>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                  <h2 class="h5 mb-0">Detalle del pago</h2>
                </div>
                <div class="card-body">
                  <div id="rawData" class="row g-3"></div>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                  <h2 class="h5 mb-0">Detalle completo de la transaccion</h2>
                </div>
                <div class="card-body">
                  <pre id="fullJson" class="json-box mb-0"></pre>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
